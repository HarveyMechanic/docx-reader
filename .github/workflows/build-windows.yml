name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Remove any patch from Cargo.toml
        shell: pwsh
        run: |
          $content = Get-Content "src-tauri/Cargo.toml" -Raw
          $content = [regex]::Replace($content, '\r?\n\[patch\.crates-io\][\s\S]*$', '')
          Set-Content "src-tauri/Cargo.toml" $content -NoNewline

      - name: Fetch cargo dependencies
        shell: pwsh
        run: |
          cd src-tauri
          cargo fetch

      - name: Patch core-foundation for Windows
        shell: pwsh
        run: |
          $cargoHome = $env:USERPROFILE + "\.cargo"
          $registryBase = "$cargoHome\registry\src"

          # Find the core-foundation source directory (any version)
          $cfDir = Get-ChildItem -Path $registryBase -Recurse -Directory |
            Where-Object { $_.Name -like "core-foundation-*" -and $_.Name -notlike "core-foundation-sys*" } |
            Select-Object -First 1

          if (-not $cfDir) {
            Write-Error "Could not find core-foundation source directory"
            exit 1
          }

          Write-Host "Found core-foundation at: $($cfDir.FullName)"

          # --- Patch filedescriptor.rs: wrap entire content in #[cfg(unix)] ---
          $fdFile = Join-Path $cfDir.FullName "src\filedescriptor.rs"
          if (Test-Path $fdFile) {
            Write-Host "Patching filedescriptor.rs"
            $src = Get-Content $fdFile -Raw
            if ($src -notmatch '#\[cfg\(unix\)\]') {
              $patched = "#![cfg(unix)]`n`n" + $src
              Set-Content $fdFile $patched -NoNewline
            }
          }

          # --- Patch url.rs: remove PATH_MAX from the libc import ---
          $urlFile = Join-Path $cfDir.FullName "src\url.rs"
          if (Test-Path $urlFile) {
            Write-Host "Patching url.rs"
            $src = Get-Content $urlFile -Raw
            $src = $src -replace 'use libc::\{c_char, strlen, PATH_MAX\};', '#[cfg(unix)] use libc::{c_char, strlen, PATH_MAX};'
            Set-Content $urlFile $src -NoNewline
          }

          # --- Patch runloop.rs: gate the CFFileDescriptor import and usage ---
          $rlFile = Join-Path $cfDir.FullName "src\runloop.rs"
          if (Test-Path $rlFile) {
            Write-Host "Patching runloop.rs"
            $src = Get-Content $rlFile -Raw
            $src = $src -replace 'use filedescriptor::CFFileDescriptor;', '#[cfg(unix)] use filedescriptor::CFFileDescriptor;'
            Set-Content $rlFile $src -NoNewline
          }

          Write-Host "All patches applied."

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: docx-reader-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30
