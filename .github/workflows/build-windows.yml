name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Remove bad patch from Cargo.toml
        shell: pwsh
        run: |
          $content = Get-Content "src-tauri/Cargo.toml" -Raw
          $content = [regex]::Replace($content, '\r?\n\[patch\.crates-io\][\s\S]*$', '')
          Set-Content "src-tauri/Cargo.toml" $content -NoNewline

      - name: Patch filedescriptor.rs to skip Unix code on Windows
        shell: pwsh
        run: |
          $cargoHome = $env:USERPROFILE + "\.cargo"
          # First run cargo fetch so the crate source is downloaded
          cd src-tauri
          cargo fetch
          cd ..
          # Find the filedescriptor.rs file in the cargo registry
          $file = Get-ChildItem -Path "$cargoHome\registry\src" -Recurse -Filter "filedescriptor.rs" |
            Where-Object { $_.FullName -like "*core-foundation*" } |
            Select-Object -First 1
          if ($file) {
            Write-Host "Patching: $($file.FullName)"
            $src = Get-Content $file.FullName -Raw
            # Wrap the entire file content in a cfg(unix) gate
            $patched = "#[cfg(unix)]`nmod inner {`n" + $src + "`n}`n"
            Set-Content $file.FullName $patched
            Write-Host "Patched successfully"
          } else {
            Write-Host "filedescriptor.rs not found - may already be clean"
          }

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: docx-reader-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30
