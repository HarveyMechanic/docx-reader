name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Remove any patch from Cargo.toml
        shell: pwsh
        run: |
          $content = Get-Content "src-tauri/Cargo.toml" -Raw
          $content = [regex]::Replace($content, '\r?\n\[patch\.crates-io\][\s\S]*$', '')
          Set-Content "src-tauri/Cargo.toml" $content -NoNewline

      - name: Fetch cargo dependencies
        shell: pwsh
        run: cd src-tauri && cargo fetch

      - name: Patch core-foundation for Windows
        shell: pwsh
        run: |
          $registryBase = "$env:USERPROFILE\.cargo\registry\src"

          # Find the core-foundation source directory (not core-foundation-sys)
          $cfDir = Get-ChildItem -Path $registryBase -Recurse -Directory |
            Where-Object { $_.Name -match '^core-foundation-\d' } |
            Select-Object -First 1

          if (-not $cfDir) {
            Write-Error "Could not find core-foundation source directory under $registryBase"
            exit 1
          }
          Write-Host "Patching: $($cfDir.FullName)"

          # ---- 1. filedescriptor.rs: gate entire file for unix only ----
          $f = Join-Path $cfDir.FullName "src\filedescriptor.rs"
          if (Test-Path $f) {
            $src = Get-Content $f -Raw
            if ($src -notmatch '#!\[cfg\(unix\)\]') {
              Set-Content $f ("#![cfg(unix)]`n" + $src) -NoNewline
              Write-Host "  Patched filedescriptor.rs"
            } else { Write-Host "  filedescriptor.rs already patched" }
          }

          # ---- 2. url.rs: remove PATH_MAX (not available on Windows libc) ----
          $f = Join-Path $cfDir.FullName "src\url.rs"
          if (Test-Path $f) {
            $src = Get-Content $f -Raw
            $new = $src -replace 'use libc::\{c_char, strlen, PATH_MAX\};', 'use libc::{c_char, strlen};'
            if ($new -ne $src) {
              Set-Content $f $new -NoNewline
              Write-Host "  Patched url.rs (PATH_MAX removed)"
            } else { Write-Host "  url.rs: pattern not found, skipping" }
          }

          # ---- 3. runloop.rs: remove all references to CFFileDescriptor ----
          $f = Join-Path $cfDir.FullName "src\runloop.rs"
          if (Test-Path $f) {
            $src = Get-Content $f -Raw
            # Remove the import line
            $new = $src -replace 'use filedescriptor::CFFileDescriptor;\r?\n', ''
            # Remove the from_file_descriptor function (pub fn ... { ... })
            # It spans multiple lines so we use a non-greedy multiline match
            $new = [regex]::Replace($new,
              '(?s)pub fn from_file_descriptor\(fd: &CFFileDescriptor.*?\}(\s*\})',
              '$1')
            if ($new -ne $src) {
              Set-Content $f $new -NoNewline
              Write-Host "  Patched runloop.rs (CFFileDescriptor removed)"
            } else { Write-Host "  runloop.rs: pattern not found, skipping" }
          }

          Write-Host "Done patching."

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: docx-reader-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30
