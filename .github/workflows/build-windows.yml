name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Remove any patch from Cargo.toml
        shell: pwsh
        run: |
          $content = Get-Content "src-tauri/Cargo.toml" -Raw
          $content = [regex]::Replace($content, '\r?\n\[patch\.crates-io\][\s\S]*$', '')
          Set-Content "src-tauri/Cargo.toml" $content -NoNewline

      - name: Fetch cargo dependencies
        shell: pwsh
        run: cd src-tauri && cargo fetch

      - name: Patch Apple-only crates for Windows
        shell: pwsh
        run: |
          $reg = "$env:USERPROFILE\.cargo\registry\src"

          # Gate an entire crate by prepending #![cfg(target_os="macos")] to lib.rs only
          function Gate-Crate-Macos($dir) {
            $lib = Join-Path $dir "src\lib.rs"
            if (Test-Path $lib) {
              $s = Get-Content $lib -Raw
              if ($s -notmatch '#!\[cfg\(target_os = .macos.\)\]') {
                Set-Content $lib ('#![cfg(target_os = "macos")]' + "`n" + $s) -NoNewline
                Write-Host "  Gated lib.rs as macos-only: $dir"
              }
            }
          }

          # ── core-foundation: surgical fixes only ─────────────────────────
          $cf = Get-ChildItem $reg -Recurse -Directory |
            Where-Object { $_.Name -match '^core-foundation-\d' } | Select-Object -First 1
          if ($cf) {
            Write-Host "Patching $($cf.Name)"

            # filedescriptor.rs - gate whole file
            $f = Join-Path $cf.FullName "src\filedescriptor.rs"
            if (Test-Path $f) {
              $s = Get-Content $f -Raw
              if ($s -notmatch '#!\[cfg') {
                Set-Content $f ("#![cfg(unix)]`n" + $s) -NoNewline
                Write-Host "  Gated filedescriptor.rs"
              }
            }

            # url.rs - remove PATH_MAX from libc import
            $f = Join-Path $cf.FullName "src\url.rs"
            if (Test-Path $f) {
              $s = Get-Content $f -Raw
              $s2 = $s -replace 'use libc::\{c_char, strlen, PATH_MAX\};', 'use libc::{c_char, strlen};'
              if ($s2 -ne $s) { Set-Content $f $s2 -NoNewline; Write-Host "  Fixed PATH_MAX in url.rs" }
            }

            # runloop.rs - remove CFFileDescriptor import and function
            $f = Join-Path $cf.FullName "src\runloop.rs"
            if (Test-Path $f) {
              $s = Get-Content $f -Raw
              $s2 = $s -replace 'use filedescriptor::CFFileDescriptor;\r?\n', ''
              $s2 = [regex]::Replace($s2,
                '(?s)\s*pub fn from_file_descriptor\(fd: &CFFileDescriptor[^}]+\}(\s*\})',
                '$1')
              if ($s2 -ne $s) { Set-Content $f $s2 -NoNewline; Write-Host "  Fixed runloop.rs" }
            }
          }

          # ── Gate these whole crates as macos-only ────────────────────────
          $cratesToGate = @(
            '^core-graphics-types-',
            '^core-graphics-\d',
            '^cocoa-\d',
            '^cocoa-foundation-'
          )
          foreach ($pattern in $cratesToGate) {
            Get-ChildItem $reg -Recurse -Directory |
              Where-Object { $_.Name -match $pattern } | ForEach-Object {
                Write-Host "Gating $($_.Name)"
                Gate-Crate-Macos $_.FullName
              }
          }

          Write-Host "All patches applied."

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: docx-reader-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30
