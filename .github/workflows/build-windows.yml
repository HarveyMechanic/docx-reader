name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Remove any patch from Cargo.toml
        shell: pwsh
        run: |
          $content = Get-Content "src-tauri/Cargo.toml" -Raw
          $content = [regex]::Replace($content, '\r?\n\[patch\.crates-io\][\s\S]*$', '')
          Set-Content "src-tauri/Cargo.toml" $content -NoNewline

      - name: Update tao to latest 0.16.x (drops cocoa/core-graphics on Windows)
        shell: pwsh
        run: |
          cd src-tauri
          cargo update -p tao --precise 0.16.11

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: docx-reader-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30
